version: "3.8"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manabeelkhair}
      POSTGRES_USER: ${POSTGRES_USER:-manabeelkhair}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manabeelkhair_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-manabeelkhair}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-manabeelkhair}:${POSTGRES_PASSWORD:-manabeelkhair_pass_2024}@postgres:5432/${POSTGRES_DB:-manabeelkhair}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-long-random-string}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
